name: Scripts Validation

on:
  push:
    branches: [main]
    paths:
      - 'src/scripts/**'
      - '.github/workflows/scripts.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/scripts/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run shellcheck on all scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './src/scripts'
          severity: warning
          format: gcc

  smoke-test:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y bash curl jq git

      - name: Test script syntax
        run: |
          for script in src/scripts/*.sh; do
            echo "Checking: $script"
            bash -n "$script" || exit 1
          done

      - name: Verify common.sh library
        run: |
          bash -n src/scripts/lib/common.sh
          source src/scripts/lib/common.sh
          # Verify functions exist
          declare -f require_command >/dev/null || exit 1
          declare -f require_var >/dev/null || exit 1
          declare -f download_and_verify >/dev/null || exit 1

      - name: Test library functions (dry-run)
        run: |
          source src/scripts/lib/common.sh

          # Test: require_command with existing command
          require_command bash && echo "✓ require_command works"

          # Test: get_architecture
          arch=$(get_architecture)
          [[ "$arch" =~ ^(amd64|arm64|unknown)$ ]] && echo "✓ get_architecture works: $arch"

          # Test: get_distro
          distro=$(get_distro)
          [[ "$distro" =~ ^(debian|ubuntu|unknown)$ ]] && echo "✓ get_distro works: $distro"

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check script permissions
        run: |
          for script in src/scripts/*.sh; do
            if [[ ! -x "$script" ]]; then
              echo "Warning: $script is not executable"
              chmod +x "$script"
            fi
          done

      - name: Verify no secrets in scripts
        run: |
          if grep -r "password\|secret\|token\|key" src/scripts/*.sh | grep -v "^Binary"; then
            echo "⚠️ WARNING: Possible secrets found in scripts (review manually)"
            exit 0  # Don't fail CI, just warn
          fi
