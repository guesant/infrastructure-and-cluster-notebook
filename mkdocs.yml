# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: cluster-management-notes
site_description: Anotações sobre clusters K3s de nó único ou multinó, com conceitos, melhores práticas, guias passo a passo e scripts.
site_url: https://guesant.github.io/cluster-management-notes/

repo_name: guesant/cluster-management-notes
repo_url: https://github.com/guesant/cluster-management-notes
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  language: pt-BR
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Usar tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Usar tema claro

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Início: index.md
  - Configuração dos hosts: hosts.md
  - Gestão dos nós K3s: k3s.md
  - Ferramentas de linha de comando: command-line-tools.md
  - Serviços básicos: core-services.md
  - Templates copiáveis: templates.md
  - Checklist operacional: operational-checklist.md

copyright: Conteúdo disponibilizado pelo projeto cluster-management-notes.
